<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>潮州斷層地震活動分析 (1973-2026)</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 補足 tailwindcss-animate 的自訂動畫效果 */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(1rem); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in {
      animation: fadeInUp 0.5s ease-out forwards;
    }
  </style>

  <!-- 引入 React 與 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel 讓瀏覽器可以直接編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 引入 Recharts -->
  <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
</head>
<body class="bg-slate-50">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;
    const { 
      BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, Legend, ResponsiveContainer,
      PieChart, Pie, Cell
    } = window.Recharts;

    // --- 圖示元件替代 (原 lucide-react) ---
    const Activity = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
      </svg>
    );
    const AlertTriangle = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><path d="M12 9v4"></path><path d="M12 17h.01"></path>
      </svg>
    );
    const MapIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon><line x1="9" x2="9" y1="3" y2="18"></line><line x1="15" x2="15" y1="6" y2="21"></line>
      </svg>
    );
    const Clock = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline>
      </svg>
    );
    const ShieldAlert = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"></path><path d="M12 8v4"></path><path d="M12 16h.01"></path>
      </svg>
    );
    const ChevronRight = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="m9 18 6-6-6-6"></path>
      </svg>
    );

    // --- 資料準備 ---
    const regionData = [
      { name: '北段 (Lat≥22.60)', '<3.5微震': 161, '3.5-3.9': 55, '4.0-4.4': 12, '4.5-4.9': 2, '>=5.0': 1 },
      { name: '中段 (22.45-22.60)', '<3.5微震': 62, '3.5-3.9': 16, '4.0-4.4': 2, '4.5-4.9': 2, '>=5.0': 0 },
      { name: '南段 (Lat<22.45)', '<3.5微震': 78, '3.5-3.9': 15, '4.0-4.4': 2, '4.5-4.9': 2, '>=5.0': 0 },
    ];

    const totalMagData = [
      { name: '北段總計', value: 231 },
      { name: '中段總計', value: 82 },
      { name: '南段總計', value: 97 },
    ];

    // 新增：年代趨勢資料
    const temporalData = [
      { decade: '1970s', '<3.5微震': 18, '3.5-3.9': 4, '4.0-4.4': 0, '4.5-4.9': 2, '>=5.0': 0 },
      { decade: '1980s', '<3.5微震': 52, '3.5-3.9': 9, '4.0-4.4': 3, '4.5-4.9': 0, '>=5.0': 0 },
      { decade: '1990s', '<3.5微震': 62, '3.5-3.9': 23, '4.0-4.4': 3, '4.5-4.9': 2, '>=5.0': 0 },
      { decade: '2000s', '<3.5微震': 57, '3.5-3.9': 16, '4.0-4.4': 2, '4.5-4.9': 0, '>=5.0': 0 },
      { decade: '2010s', '<3.5微震': 59, '3.5-3.9': 20, '4.0-4.4': 5, '4.5-4.9': 2, '>=5.0': 1 },
      { decade: '2020s', '<3.5微震': 53, '3.5-3.9': 14, '4.0-4.4': 3, '4.5-4.9': 0, '>=5.0': 0 },
    ];

    const COLORS = ['#ef4444', '#f59e0b', '#10b981'];

    // --- 主程式 App ---
    function App() {
      const [activeTab, setActiveTab] = useState('spatial');

      const tabs = [
        { id: 'spatial', icon: MapIcon, label: '空間特徵 (北熱中南冷)' },
        { id: 'temporal', icon: Clock, label: '時間特徵 (沉寂被打破)' },
        { id: 'warning', icon: ShieldAlert, label: '前兆意義與防範' }
      ];

      return (
        <div className="min-h-screen text-slate-800 font-sans selection:bg-blue-200">
          
          {/* 頂部橫幅 */}
          <header className="bg-slate-900 text-white p-6 md:p-10 shadow-lg">
            <div className="max-w-6xl mx-auto">
              <h1 className="text-3xl md:text-5xl font-bold mb-4 flex items-center gap-3">
                <Activity className="w-10 h-10 md:w-12 md:h-12 text-red-500 animate-pulse" />
                潮州斷層地震活動分析 (1973-2026)
              </h1>
              <p className="text-xl md:text-2xl text-slate-300">
                針對 2026/03/29 中段規模 4.7 地震之特別報告
              </p>
            </div>
          </header>

          <main className="max-w-6xl mx-auto p-4 md:p-6 lg:p-8 space-y-8">
            
            {/* 警示橫幅 */}
            <div className="bg-red-50 border-l-8 border-red-500 p-6 md:p-8 rounded-r-2xl shadow-md flex flex-col md:flex-row items-start md:items-center gap-6">
              <div className="bg-red-100 p-4 rounded-full">
                <AlertTriangle className="w-12 h-12 md:w-16 md:h-16 text-red-600" />
              </div>
              <div>
                <h2 className="text-2xl md:text-3xl font-bold text-red-800 mb-2">
                  ⚠️ 震情快報：罕見的中段地震
                </h2>
                <p className="text-lg md:text-2xl text-red-900 leading-relaxed">
                  今日（3/29）於 <strong>東經 120.64, 北緯 22.46</strong> 發生規模 <strong>4.7</strong> 地震。
                  此區域為過去數十年來極少發生地震的<strong>「相對空白區」</strong>，需特別留意後續發展！
                </p>
              </div>
            </div>

            {/* 互動式導覽標籤 */}
            <div className="flex flex-wrap gap-4 border-b-2 border-slate-200 pb-2">
              {tabs.map((tab) => {
                const IconComponent = tab.icon;
                return (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`flex items-center gap-2 px-6 py-4 rounded-t-xl text-xl font-bold transition-all duration-300 ${
                      activeTab === tab.id 
                        ? 'bg-blue-600 text-white shadow-lg translate-y-1' 
                        : 'bg-white text-slate-600 hover:bg-slate-100 border border-slate-200 border-b-0'
                    }`}
                  >
                    <IconComponent className="w-6 h-6" />
                    {tab.label}
                  </button>
                );
              })}
            </div>

            {/* 內容區域 */}
          <div className="bg-white p-6 md:p-10 rounded-2xl shadow-xl min-h-[500px]">
            
            {/* 空間特徵 Tab */}
            {activeTab === 'spatial' && (
              <div className="space-y-8 animate-in">
                <h3 className="text-3xl font-bold border-b pb-4 text-slate-800">📍 空間分佈：北段活躍，中段極度空白</h3>
                
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-10 items-center">
                  <div className="space-y-6 text-xl md:text-2xl leading-relaxed text-slate-700">
                    <p>
                      將斷層帶分為三段來看，呈現明顯的<strong className="text-red-600">「北熱、中南冷」</strong>空間不均勻現象。
                    </p>
                    <ul className="space-y-4 list-none">
                      <li className="flex gap-3"><ChevronRight className="w-6 h-6 text-blue-500 shrink-0 mt-1"/> <div><strong>北段：</strong> M4.0~4.5 事件佔全區 75%，歷史上唯一的規模5以上地震(2012年)也發生於此，最為活躍。</div></li>
                      <li className="flex gap-3 bg-red-50 p-3 rounded-lg border border-red-200"><ChevronRight className="w-6 h-6 text-red-500 shrink-0 mt-1"/> <div><strong>中段 (本次震央)：</strong> 典型<strong className="text-red-700">地震空白區 (Seismic Gap)</strong>。M≥4 事件極少(僅4次)，與北段形成強烈對比。</div></li>
                      <li className="flex gap-3"><ChevronRight className="w-6 h-6 text-blue-500 shrink-0 mt-1"/> <div><strong>南段：</strong> 中小地震數量與中段相近，大震同樣偏少。</div></li>
                    </ul>
                  </div>
                  
                  {/* 互動圖表 */}
                  <div className="bg-slate-50 p-4 rounded-xl shadow-inner border border-slate-200">
                      <h4 className="text-center text-xl font-bold mb-4 text-slate-600">各區段歷史地震規模分佈 (點擊圖例可篩選)</h4>
                      <div className="h-[350px] w-full">
                        <ResponsiveContainer width="100%" height="100%">
                          <BarChart data={regionData} margin={{ top: 20, right: 30, left: 0, bottom: 5 }}>
                            <CartesianGrid strokeDasharray="3 3" opacity={0.5} />
                            <XAxis dataKey="name" tick={{fontSize: 14, fontWeight: 'bold'}} />
                            <YAxis tick={{fontSize: 14}} />
                            <RechartsTooltip 
                              contentStyle={{ fontSize: '16px', borderRadius: '8px', boxShadow: '0 4px 6px rgba(0,0,0,0.1)' }}
                              itemStyle={{ fontWeight: 'bold' }}
                            />
                            <Legend wrapperStyle={{ fontSize: '16px', paddingTop: '10px' }} />
                            <Bar dataKey=">=5.0" stackId="a" fill="#7f1d1d" />
                            <Bar dataKey="4.5-4.9" stackId="a" fill="#dc2626" />
                            <Bar dataKey="4.0-4.4" stackId="a" fill="#f97316" />
                            <Bar dataKey="3.5-3.9" stackId="a" fill="#fbbf24" />
                            <Bar dataKey="<3.5微震" stackId="a" fill="#3b82f6" />
                        </BarChart>
                      </ResponsiveContainer>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* 時間特徵 Tab */}
            {activeTab === 'temporal' && (
              <div className="space-y-8 animate-in">
                <h3 className="text-3xl font-bold border-b pb-4 text-slate-800">⏱️ 時間特徵：11年沉寂與微震增溫</h3>
                
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-10 items-center">
                  <div className="bg-slate-50 p-4 rounded-xl shadow-inner border border-slate-200">
                    <h4 className="text-center text-xl font-bold mb-4 text-slate-600">歷年(每十年)地震規模趨勢</h4>
                    <div className="h-[300px] w-full">
                      <ResponsiveContainer width="100%" height="100%">
                        <BarChart data={temporalData} margin={{ top: 20, right: 30, left: 0, bottom: 5 }}>
                          <CartesianGrid strokeDasharray="3 3" opacity={0.5} />
                          <XAxis dataKey="decade" tick={{fontSize: 14, fontWeight: 'bold'}} />
                          <YAxis tick={{fontSize: 14}} />
                          <RechartsTooltip contentStyle={{ fontSize: '16px', borderRadius: '8px' }} itemStyle={{ fontWeight: 'bold' }} />
                          <Legend wrapperStyle={{ fontSize: '14px', paddingTop: '10px' }} />
                          <Bar dataKey=">=5.0" stackId="a" fill="#7f1d1d" />
                          <Bar dataKey="4.5-4.9" stackId="a" fill="#dc2626" />
                          <Bar dataKey="4.0-4.4" stackId="a" fill="#f97316" />
                          <Bar dataKey="3.5-3.9" stackId="a" fill="#fbbf24" />
                          <Bar dataKey="<3.5微震" stackId="a" fill="#3b82f6" />
                        </BarChart>
                      </ResponsiveContainer>
                    </div>
                  </div>

                  <div className="space-y-6 text-xl md:text-2xl leading-relaxed text-slate-700">
                    <div className="bg-white p-6 rounded-xl shadow-md border-l-4 border-blue-500">
                      <h4 className="font-bold text-blue-700 mb-2">中段的長期空白 (Seismic Gap)</h4>
                      <p>大地震主要集中在 1990-2010 年代。<strong>中段自 2015 年以來，已近 11 年完全沒有 M≥4 的地震</strong>，呈現極度的平靜。</p>
                    </div>
                    
                    <div className="bg-white p-6 rounded-xl shadow-md border-l-4 border-orange-500">
                      <h4 className="font-bold text-orange-700 mb-2">近期微震訊號 (2025-2026)</h4>
                      <p>雖然大震沉寂，但 <strong>2026年2月發生了兩次 M3.0+ 地震</strong>（與本次震央極近），顯示中段的微震活動正在增溫，為此次 M4.7 的重要前兆訊號。</p>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* 前兆意義 Tab */}
            {activeTab === 'warning' && (
              <div className="space-y-8 animate-in">
                <h3 className="text-3xl font-bold border-b pb-4 text-slate-800">🚨 觀測警示：空白區填補與大震防範</h3>
                
                <p className="text-xl md:text-2xl leading-relaxed text-slate-700 mb-6">
                  在長達 11 年沒有 M≥4 活動的中段「地震空白區」，突然發生規模 4.7 地震，並伴隨上個月的微震活動，我們必須從正反兩面來評估：
                </p>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                  <div className="bg-gradient-to-br from-green-50 to-green-100 p-8 rounded-2xl border border-green-200 shadow-md transform hover:-translate-y-1 transition-transform">
                    <h4 className="text-2xl font-bold text-green-800 mb-4 flex items-center gap-2">
                      <Activity className="w-8 h-8" />
                      正面意義：應力釋放 (補白)
                    </h4>
                    <p className="text-xl text-green-900 leading-relaxed">
                      這次 M4.7 正好填補了中段的長期空白，是一次<strong>「補白事件 (Gap-filling event)」</strong>。它可能釋放了該區塊累積的部分應力，有助於平衡全斷層的能量，短期內若餘震有限，則降低了立即發生大震的風險。
                    </p>
                  </div>

                  <div className="bg-gradient-to-br from-red-50 to-red-100 p-8 rounded-2xl border border-red-200 shadow-md transform hover:-translate-y-1 transition-transform">
                    <h4 className="text-2xl font-bold text-red-800 mb-4 flex items-center gap-2">
                      <ShieldAlert className="w-8 h-8" />
                      警示意義：孕育大震前兆
                    </h4>
                    <p className="text-xl text-red-900 leading-relaxed">
                      潮州斷層全長具備引發 <strong>M7+ 特徵地震</strong>的潛力。中段活動從「極靜」轉為「有釋放」，且 2 月已有微小前震，若此 M4.7 只是破壞了局部阻礙 (Asperity)，可能會引發後續更大規模的主震。
                    </p>
                  </div>
                </div>

                <div className="mt-10 bg-slate-800 text-white p-8 rounded-2xl shadow-xl text-center">
                  <h4 className="text-3xl font-bold mb-4 text-yellow-400">未來關鍵觀察指標 (GPS與微震群)</h4>
                  <p className="text-xl md:text-2xl text-slate-200 leading-relaxed max-w-4xl mx-auto">
                    後續應密切追蹤中段 <strong>M≥3 事件頻率、b值變化及 GPS 應變速率</strong>。若出現更多 M3+ 集群或位置更集中，代表斷層帶正加速「解鎖」，需高度警戒大面積錯動的可能性！
                  </p>
                </div>
              </div>
            )}

          </div>
        </main>

          <footer className="text-center p-6 text-slate-500 text-lg border-t mt-12">
            <p>資料來源：潮州斷層地震活動資料 (1973-2026) | 本網頁為互動式分析報告</p>
          </footer>
        </div>
      );
    }

    // 渲染應用程式
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
